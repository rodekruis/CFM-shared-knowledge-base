name: Translate and Publish Knowledge Base
# Translates the English articles that changed into the other language folders,
# commits the results, and then publishes all articles to EspoCRM. Translation
# runs before publishing so newly generated translations are published too. It
# fires when something under articles/English changed (translating only those
# files) or when the glossary changed (retranslating everything, since a term
# change can affect any article); a manual run also retranslates everything. On
# pull requests only a publish dry-run runs (no translation, no writes).
on:
  push:
    branches:
      - main
    paths:
      - "articles/**"
      - "glossary.json"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/publish-kb.yml"
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

# Serialize the whole pipeline so runs don't race on the repo or EspoCRM.
concurrency:
  group: knowledge-base
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  translate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      # Detect which paths changed. `list-files: shell` also emits a
      # shell-quoted list of the changed files per filter (e.g.
      # `english_files`) so we can translate only what changed.
      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: changes
        with:
          list-files: shell
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/publish-kb.yml'
            english:
              - 'articles/English/**'
            glossary:
              - 'glossary.json'

      # If code changed, lint, type-check, and run the test suite; skip the rest
      # if any of them fail.
      - name: Lint and format check
        if: steps.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        if: steps.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        run: uv run ty check

      - name: Run tests
        if: steps.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        run: uv run python -m pytest

      # Translate the English articles that changed (skip entirely on pull
      # requests and when nothing relevant changed). When the glossary changed
      # or on a manual `workflow_dispatch` run, retranslate every article since
      # a term change can affect any of them.
      - name: Translate changed articles
        if: >-
          github.event_name != 'pull_request' &&
          (steps.changes.outputs.english == 'true' ||
           steps.changes.outputs.glossary == 'true' ||
           github.event_name == 'workflow_dispatch')
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             [ "${{ steps.changes.outputs.glossary }}" = "true" ]; then
            uv run cfm-kb translate
          else
            uv run cfm-kb translate ${{ steps.changes.outputs.english_files }}
          fi

      - name: Commit translations
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain articles)" ]; then
            git add articles
            git commit -m "Translate Knowledge Base articles [skip ci]"
            # Rebase onto any commits pushed to main while this run was in
            # flight so the push doesn't fail with a non-fast-forward error.
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          else
            echo "No translation changes to commit."
          fi

      - name: Validate articles (dry-run)
        if: github.event_name == 'pull_request'
        env:
          ESPO_URL: ${{ secrets.ESPO_URL }}
          ESPO_API_KEY: ${{ secrets.ESPO_API_KEY }}
        run: uv run cfm-kb publish --dry-run

      - name: Publish articles to EspoCRM
        if: github.event_name != 'pull_request'
        env:
          ESPO_URL: ${{ secrets.ESPO_URL }}
          ESPO_API_KEY: ${{ secrets.ESPO_API_KEY }}
        run: uv run cfm-kb publish
