# Knowledge Base publishing configuration.
#
# Each entry maps a Markdown file (in the ./articles folder) to one or more
# EspoCRM Knowledge Base categories. Categories are referenced by their
# human-readable NAME (exactly as shown in EspoCRM), not by internal id.
#
# Fields per article:
#   file        (required) Markdown file name, relative to the ./articles folder.
#   categories  (required) One or more category names the article belongs to.
#   title       (optional) Article title. If omitted, the first "# Heading" in
#                          the Markdown file is used, falling back to the file name.
#   status      (optional) Draft | In Review | Published | Archived.
#                          Falls back to defaults.status below.

defaults:
  status: Published

articles:
  - file: getting-started.md
    categories: [TestGithub]
    status: Published

